version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: canteen-card-db
    environment:
      POSTGRES_USER: canteen
      POSTGRES_PASSWORD: canteen_secure_password
      POSTGRES_DB: canteen_card
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canteen"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: canteen-card-app
    environment:
      DATABASE_URL: "postgresql://canteen:canteen_secure_password@postgres:5432/canteen_card"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "your-secret-key-change-in-production"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:

networks:
  default:
    name: canteen-card-network
